<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>MTG Life Counter</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta
            name="description"
            content="A simple life counter for Magic: The Gathering designed to work well on kindles."
        />
        <link rel="icon" href="favicon.png" />

        <style>
            *,
            ::before,
            ::after {
                box-sizing: border-box;
            }

            body {
                padding: 0px;
                margin: 0px;
                overflow: hidden;

                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }

            :root {
                --color-background: #000000;
                --text: #ffffff;
                --text-dim: #aaaaaa;
                --surface: #1d1d1d;
                --surface2: #323232;
            }

            .container {
                padding: 5px;

                height: 100%;
                height: 100vh;
                height: 100dvh;

                width: 100%;
                width: 100vw;
                width: 100dvw;

                background-color: #000000;
                background-color: var(--color-background);
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 5px;

                height: 100%;
                width: 100%;
            }

            .player {
                --transform-deg: 0deg;

                background-color: var(--surface);
                background: var(--surface);
                background: linear-gradient(
                    calc(var(--transform-deg) + 270deg),
                    var(--surface) 50%,
                    var(--surface2) 50%
                );
                border-radius: 20px;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

                position: relative;
            }

            /* left = top, right = bottom */
            @media (min-aspect-ratio: 1/1), (orientation: landscape) {
                /* width >= height */
                .rotate-long-left {
                    --transform-deg: 180deg;
                }
                .rotate-long-right {
                    --transform-deg: 0deg;
                }
                .rotate-short-left {
                    --transform-deg: 90deg;
                }
                .rotate-short-right {
                    --transform-deg: 270deg;
                }
            }

            @media (max-aspect-ratio: 1/1), (orientation: portrait) {
                /* height >= width */
                .rotate-long-left {
                    --transform-deg: 90deg;
                }
                .rotate-long-right {
                    --transform-deg: 270deg;
                }
                .rotate-short-left {
                    --transform-deg: 180deg;
                }
                .rotate-short-right {
                    --transform-deg: 0deg;
                }
            }

            .content {
                width: 100%;
                height: 100%;

                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                align-items: center;
                transform: rotate(var(--transform-deg));

                /* position: absolute;
                inset: 0; */
            }

            .content p {
                padding: 0px;
                margin: 0px;

                font-size: 150px;
                font-size: 20vw;
                font-size: min(20vw, 200px);

                font-weight: bold;
                font-weight: 700;

                font-family:
                    "Bookerly", "Caecilia", "Calibri", "Arial", sans-serif,
                    serif, monospace, "Comic Sans MS";

                color: #ffffff;
                color: var(--text);

                text-align: center;
            }

            .player p.small {
                font-size: 100px;
                font-size: 10vw;
                font-size: min(10vw, 150px);

                font-weight: normal;
                font-weight: 400;

                color: #aaaaaa;
                color: var(--text-dim);
            }

            .clickable {
                z-index: 10;
            }

            .left,
            .right {
                position: absolute;
                top: 0;
                width: 50%;
                height: 100%;
            }

            .left {
                left: 0;
            }

            .right {
                right: 0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="grid">
                <div class="player rotate-long-left" id="player0">
                    <div class="content split">
                        <p class="symbol-minus small">-</p>
                        <p class="life-total">40</p>
                        <p class="symbol-plus small">+</p>
                        <div
                            class="left clickable"
                            onclick="incrementLife('player0', -1)"
                        ></div>
                        <div
                            class="right clickable"
                            onclick="incrementLife('player0', 1)"
                        ></div>
                    </div>
                </div>
                <div class="player rotate-long-right" id="player1">
                    <div class="content split">
                        <p class="symbol-minus small">-</p>
                        <p class="life-total">40</p>
                        <p class="symbol-plus small">+</p>
                        <div
                            class="left clickable"
                            onclick="incrementLife('player1', -1)"
                        ></div>
                        <div
                            class="right clickable"
                            onclick="incrementLife('player1', 1)"
                        ></div>
                    </div>
                </div>
                <div class="player rotate-long-left" id="player2">
                    <div class="content split">
                        <p class="symbol-minus small">-</p>
                        <p class="life-total">40</p>
                        <p class="symbol-plus small">+</p>
                        <div
                            class="left clickable"
                            onclick="incrementLife('player2', -1)"
                        ></div>
                        <div
                            class="right clickable"
                            onclick="incrementLife('player2', 1)"
                        ></div>
                    </div>
                </div>
                <div class="player rotate-long-right" id="player3">
                    <div class="content split">
                        <p class="symbol-minus small">-</p>
                        <p class="life-total">40</p>
                        <p class="symbol-plus small">+</p>
                        <div
                            class="left clickable"
                            onclick="incrementLife('player3', -1)"
                        ></div>
                        <div
                            class="right clickable"
                            onclick="incrementLife('player3', 1)"
                        ></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script lang="text/javascript">
        let playerData = {
            player0: {
                lifeTotal: 40
            },
            player1: {
                lifeTotal: 40
            },
            player2: {
                lifeTotal: 40
            },
            player3: {
                lifeTotal: 40
            }
        }

        function incrementLife(player, amount=1) {
            const playerEl = document.getElementById(player);
            const lifeTotalDisplay = playerEl.querySelector('.life-total');
            playerData[player].lifeTotal += amount;
            lifeTotalDisplay.innerHTML = playerData[player].lifeTotal;
        }
    </script>
</html>
