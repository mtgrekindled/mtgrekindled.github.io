<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>MTG Life Counter</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta
            name="description"
            content="A simple life counter for Magic: The Gathering designed to work well on kindles."
        />
        <!-- <link rel="icon" href="favicon.png" /> -->

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <div class="grid player-container"></div>
            <div class="toggle-settings-button" onclick="toggleSettings()"></div>
        </div>
        <div class="grid settings-container hidden">
            <div class="settings-button"><p>Layout</p></div>
            <div class="settings-button"><p>Restart</p></div>
            <div class="settings-button"><p>C</p></div>
            <div class="settings-button" onclick="toggleSettings()"><p>Exit</p></div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
